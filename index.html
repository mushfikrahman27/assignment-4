<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Tracker Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="home-wrapper">
        <header class="header-group">
            <h1 class="main-title">Job Application Tracker</h1>
            
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-label">Total</span>
                    <h2 id="total-val" class="card-value gradient-text">0</h2>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Interview</span>
                    <h2 id="interview-val" class="card-value green-text">0</h2>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Rejected</span>
                    <h2 id="rejected-val" class="card-value red-text">0</h2>
                </div>
            </div>
        </header>

        <div class="divider-line"></div>

        <section class="main-content">
            <div class="available-jobs-header">
                <h3>Available Jobs</h3>
                <span id="job-count-label">0 jobs</span>
            </div>
 
            <nav class="tab-container" id="tabGroup">
                <button class="tab-btn active" data-tab="all">All</button>
                <button class="tab-btn" data-tab="interview">Interview</button>
                <button class="tab-btn" data-tab="rejected">Rejected</button>
            </nav>

            <div id="dynamic-content-area" class="content-grid">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
